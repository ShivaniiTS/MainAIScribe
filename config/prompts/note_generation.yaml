# ─────────────────────────────────────────────────────────────────────────────
# Template block (inserted when a specialty template is loaded)
# {sections_directive} is a formatted list of LABEL: [hint] entries
# ─────────────────────────────────────────────────────────────────────────────
template_block_template: |
  NOTE FORMAT — generate ALL of these sections in order, using exactly these headers:
  {sections_directive}

# ─────────────────────────────────────────────────────────────────────────────
# Context block template (inserted when EHR context is available)
# ─────────────────────────────────────────────────────────────────────────────
context_block_template: |
  PATIENT CONTEXT (from EHR — do not repeat verbatim, use only to inform clinical accuracy):
  {context_text}

# ─────────────────────────────────────────────────────────────────────────────
# Specialty vocabulary block (inserted when specialty dictionary is loaded)
# {specialty_label} e.g. "Orthopedic"
# {vocab_terms} comma-separated hotwords
# ─────────────────────────────────────────────────────────────────────────────
vocab_block_template: |
  SPECIALTY VOCABULARY ({specialty_label}) — recognise and use these terms correctly:
  {vocab_terms}

# ─────────────────────────────────────────────────────────────────────────────
# Style directive block (inserted when provider has style directives)
# ─────────────────────────────────────────────────────────────────────────────
style_block_template: |
  PROVIDER STYLE PREFERENCES:
  {directives}

