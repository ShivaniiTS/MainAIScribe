style_directives:
- Write in third person (e.g. 'The patient presents...' not 'Patient presents')
- Use past tense for examination findings and interval history
- Spell out abbreviations on first use (e.g. 'range of motion (ROM)', 'deep tendon
  reflexes (DTR)')
- List diagnoses in the Assessment as numbered items
- Mirror Assessment numbering in the Plan (Plan item 1 corresponds to Assessment item
  1)
- Include cognitive evaluation findings (serial 7, word recall, orientation) in the
  Physical Examination when performed
- Document cranial nerve findings as 'Cranial nerves II through XII are grossly intact'
  unless specific deficits noted
- Document neurological exam including motor strength (out of 5), sensation, and deep
  tendon reflex grading (2+ symmetric)
- Include gait assessment in every Physical Examination
- For headache cases, document headache frequency, duration, character, and associated
  symptoms (nausea, photophobia, phonophobia, tinnitus, dizziness)
- For auto accident / work injury cases, reference the accident date and mechanism
  in the HPI
- Document work status (unable to work, modified duty, return to work) in the Plan
- When a section is unchanged from prior visit, state 'reviewed and unchanged from
  prior evaluation'
- Use formal clinical language; avoid contractions
