# docker-compose.yml — Development deployment (two server instances on one machine)
#
# Runs provider-facing and processing-pipeline as separate services.
#
# For split deployment across machines, use:
#   deploy/docker-compose.provider.yml   (provider-facing server)
#   deploy/docker-compose.pipeline.yml   (processing pipeline server)
#
# Required env vars before running on a remote server:
#   export PUBLIC_IP=$(curl -s checkip.amazonaws.com)
#   docker compose -f docker-compose.yml up -d --build

services:
  # ── Provider-facing API (port 8001 — avoids conflict with other projects on 8000) ──
  api-provider:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8001:8000"
    volumes:
      - ./ai-scribe-data:/app/ai-scribe-data
      - ./output:/app/output
      - ./config:/app/config
    environment:
      - AI_SCRIBE_SERVER_ROLE=provider-facing
      - AI_SCRIBE_DATA_DIR=/app/ai-scribe-data
      - AI_SCRIBE_OUTPUT_DIR=/app/output
      - AI_SCRIBE_CONFIG_DIR=/app/config
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ── Processing-pipeline API (port 8100) ─────────────────────────────
  api-pipeline:
    build:
      context: .
      dockerfile: deploy/Dockerfile.pipeline
    ports:
      - "8100:8100"
    volumes:
      - ./pipeline-data:/app/pipeline-data
      - ./pipeline-output:/app/pipeline-output
      - ./config:/app/config
    environment:
      - AI_SCRIBE_SERVER_ROLE=processing-pipeline
      - AI_SCRIBE_DATA_DIR=/app/pipeline-data
      - AI_SCRIBE_OUTPUT_DIR=/app/pipeline-output
      - AI_SCRIBE_CONFIG_DIR=/app/config
      - PYTHONUNBUFFERED=1
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8100"]
    restart: unless-stopped

  # ── Provider web portal (port 3000) ─────────────────────────────────
  # NEXT_PUBLIC_API_URL must be the PUBLIC IP so browsers outside the server
  # can reach the API. Set PUBLIC_IP before running:
  #   export PUBLIC_IP=$(curl -s checkip.amazonaws.com)
  web:
    build:
      context: ./client/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://${PUBLIC_IP:-localhost}:8001
      - NEXT_PUBLIC_PIPELINE_API_URL=http://${PUBLIC_IP:-localhost}:8100
      - NEXT_PUBLIC_SERVER_ROLE=provider-facing
    depends_on:
      - api-provider
    restart: unless-stopped

